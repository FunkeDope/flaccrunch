name: Build & Release

on:
  push:
    tags:
      - 'v*'
      - 'V*'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: macos-arm

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('FlacCrunch {0}', github.ref_name) || '' }}
          releaseBody: |
            Cross-platform lossless FLAC recompression with album art optimization.
            FLAC encoding is built natively into the app — no external dependencies required.

            ## Downloads
            - **Windows**: `.msi` installer or `.exe` setup
            - **macOS**: `.dmg` disk image
            - **Linux**: `.deb` package or `.AppImage`
            - **Android**: `.apk`

            ## Features
            - Lossless FLAC recompression at maximum compression (level 8, exhaustive)
            - Decoded-audio MD5 verification for data integrity
            - PNG optimization (oxipng) and JPEG optimization (jpegtran)
            - Multi-threaded processing with configurable worker count
            - Real-time progress dashboard
            - Detailed logging with EFC-format summary
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Copy standalone exe (Windows only)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          EXE="src-tauri/target/${{ matrix.target }}/release/flaccrunch.exe"
          if [ -f "$EXE" ]; then
            cp "$EXE" "src-tauri/target/${{ matrix.target }}/release/flaccrunch-portable.exe"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flaccrunch-${{ matrix.artifact }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/flaccrunch-portable.exe
          if-no-files-found: ignore

  build-android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and SDK Platform
        run: |
          sdkmanager --install "ndk;27.0.12077973" "platforms;android-35" "build-tools;35.0.0"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Initialize Tauri Android project
        run: npx tauri android init

      - name: Configure Android SDK versions for Pixel 9a (API 35+)
        run: |
          GRADLE_FILE="src-tauri/gen/android/app/build.gradle.kts"
          if [ -f "$GRADLE_FILE" ]; then
            # Set minSdk to 24 (Android 7+), targetSdk/compileSdk to 35 (Android 15)
            sed -i 's/minSdk = [0-9]*/minSdk = 24/' "$GRADLE_FILE"
            sed -i 's/targetSdk = [0-9]*/targetSdk = 35/' "$GRADLE_FILE"
            sed -i 's/compileSdk = [0-9]*/compileSdk = 35/' "$GRADLE_FILE"
          fi

      - name: Patch Android permissions into manifest
        run: |
          MANIFEST="src-tauri/gen/android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            # Insert permission declarations before <application ...>
            sed -i 's|<application |<uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29" />\n    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />\n    <application |' "$MANIFEST"
            echo "Patched AndroidManifest.xml:"
            cat "$MANIFEST"
          fi

      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore /tmp/flaccrunch-release.keystore \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias release \
            -storepass flaccrunch -keypass flaccrunch \
            -dname "CN=FlacCrunch, OU=Dev, O=FlacCrunch, L=Unknown, ST=Unknown, C=US"

      - name: Build Android APK
        run: npx tauri android build --apk
        env:
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Sign APK files
        run: |
          # Find and sign all unsigned APKs with apksigner
          find . -name "*.apk" -not -path "./.git/*" -type f | while read apk; do
            echo "Signing: $apk"
            # zipalign first (required before signing)
            "$ANDROID_HOME/build-tools/35.0.0/zipalign" -f 4 "$apk" "${apk}.aligned"
            mv "${apk}.aligned" "$apk"
            # Sign with apksigner
            "$ANDROID_HOME/build-tools/35.0.0/apksigner" sign \
              --ks /tmp/flaccrunch-release.keystore \
              --ks-pass pass:flaccrunch \
              --ks-key-alias release \
              --key-pass pass:flaccrunch \
              "$apk"
          done

      - name: Collect APK files
        run: |
          mkdir -p release-apks
          REF_SLUG=$(echo "${{ github.ref_name }}" | sed 's|/|-|g')
          find . -name "*.apk" -not -path "./.git/*" -type f | while read apk; do
            BASENAME=$(basename "$apk")
            cp "$apk" "release-apks/FlacCrunch-${REF_SLUG}-${BASENAME}"
          done
          echo "Collected APKs:"
          ls -la release-apks/ 2>/dev/null || echo "No APKs found"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flaccrunch-android
          path: release-apks/*.apk
          if-no-files-found: warn

      - name: Upload APK to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release-apks/*.apk
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
