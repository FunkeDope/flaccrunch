name: Build & Release

on:
  push:
    tags:
      - 'v*'
      - 'V*'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: macos-arm

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('FlacCrunch {0}', github.ref_name) || '' }}
          releaseBody: |
            Cross-platform FLAC optimizer with GUI and CLI. Losslessly recompresses at level 8 exhaustive, verifies decoded-audio MD5 integrity, and optimizes embedded album art. Statically linked libFLAC — no external binaries required.

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for full release notes.

            ## Downloads
            | Platform | File |
            |----------|------|
            | Windows (portable) | `FlacCrunch.exe` |
            | Windows (installer) | `.msi` |
            | macOS (Apple Silicon) | `.dmg` |
            | Linux | `.deb` or `.AppImage` |
            | Android | `FlacCrunch-{version}-arm64.apk` (most devices) |

            ## Quick start (CLI)
            ```
            FlacCrunch.exe -silent "D:\Music"
            FlacCrunch.exe -silent -threads 4 "D:\Music" "E:\More"
            ```
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }} ${{ runner.os == 'Windows' && '--bundles msi' || '' }}

      - name: Stage portable exe (Windows only)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          EXE="src-tauri/target/${{ matrix.target }}/release/flaccrunch.exe"
          if [ -f "$EXE" ]; then
            mkdir -p portable-out
            # Copy to a separate directory so the rename isn't a same-file no-op
            # on the case-insensitive Windows filesystem.
            cp "$EXE" portable-out/FlacCrunch.exe
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flaccrunch-${{ matrix.artifact }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            portable-out/FlacCrunch.exe
          if-no-files-found: ignore

      - name: Upload portable exe to release (Windows, tag only)
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: portable-out/FlacCrunch.exe
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and SDK Platform
        run: |
          sdkmanager --install "ndk;27.0.12077973" "platforms;android-35" "build-tools;35.0.0"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Initialize Tauri Android project
        run: npx tauri android init

      - name: Configure Android SDK versions for Pixel 9a (API 35+)
        run: |
          GRADLE_FILE="src-tauri/gen/android/app/build.gradle.kts"
          if [ -f "$GRADLE_FILE" ]; then
            # Set minSdk to 24 (Android 7+), targetSdk/compileSdk to 35 (Android 15)
            sed -i 's/minSdk = [0-9]*/minSdk = 24/' "$GRADLE_FILE"
            sed -i 's/targetSdk = [0-9]*/targetSdk = 35/' "$GRADLE_FILE"
            sed -i 's/compileSdk = [0-9]*/compileSdk = 35/' "$GRADLE_FILE"
          fi

      - name: Patch Android manifest with storage permissions
        run: |
          MANIFEST="src-tauri/gen/android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            # Insert READ permissions before <application> (no MANAGE_EXTERNAL_STORAGE —
            # that permission cannot be toggled on for sideloaded apps and is unnecessary
            # when using ACTION_OPEN_DOCUMENT for SAF-based read+write access).
            sed -i 's|<application |<uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />\n    <application |' "$MANIFEST"
            # Enable legacy external storage on Android 10 (API 29) to allow direct path access.
            sed -i 's|<application |<application android:requestLegacyExternalStorage="true" |' "$MANIFEST"
            echo "Patched AndroidManifest.xml:"
            cat "$MANIFEST"
          fi

      - name: Patch MainActivity to request READ_MEDIA_AUDIO at runtime
        run: |
          MAIN_ACTIVITY="src-tauri/gen/android/app/src/main/java/com/flaccrunch/app/MainActivity.kt"
          if [ -f "$MAIN_ACTIVITY" ]; then
            cp src-tauri/android-patches/MainActivity.kt "$MAIN_ACTIVITY"
            echo "Patched MainActivity.kt"
          else
            echo "WARNING: MainActivity.kt not found at $MAIN_ACTIVITY"
          fi

      - name: Patch dialog plugin to use ACTION_OPEN_DOCUMENT (grants read+write per file)
        run: |
          # ACTION_OPEN_DOCUMENT (vs ACTION_GET_CONTENT) grants both read AND write
          # URI permissions for the selected files — enabling write-back without any
          # special storage permissions.
          DIALOG_PLUGIN=$(find src-tauri/gen/android -name "DialogPlugin.kt" 2>/dev/null | head -1)
          if [ -n "$DIALOG_PLUGIN" ]; then
            sed -i 's/Intent\.ACTION_GET_CONTENT/Intent.ACTION_OPEN_DOCUMENT/g' "$DIALOG_PLUGIN"
            sed -i '/TODO: ACTION_OPEN_DOCUMENT/d' "$DIALOG_PLUGIN"
            echo "Patched $DIALOG_PLUGIN: ACTION_GET_CONTENT -> ACTION_OPEN_DOCUMENT"
          else
            echo "WARNING: DialogPlugin.kt not found — write-back may not work"
          fi

      - name: Copy Android icons into generated project
        run: |
          RES_DIR="src-tauri/gen/android/app/src/main/res"
          if [ -d "$RES_DIR" ]; then
            cp -r src-tauri/icons/android/. "$RES_DIR/"
            echo "Copied Android icons to $RES_DIR"
          else
            echo "WARNING: Android res directory not found at $RES_DIR"
          fi

      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore /tmp/flaccrunch-release.keystore \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias release \
            -storepass flaccrunch -keypass flaccrunch \
            -dname "CN=FlacCrunch, OU=Dev, O=FlacCrunch, L=Unknown, ST=Unknown, C=US"

      - name: Build Android APK
        run: npx tauri android build --apk
        env:
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Sign APK files
        run: |
          # Find and sign all unsigned APKs with apksigner
          find . -name "*.apk" -not -path "./.git/*" -type f | while read apk; do
            echo "Signing: $apk"
            # zipalign first (required before signing)
            "$ANDROID_HOME/build-tools/35.0.0/zipalign" -f 4 "$apk" "${apk}.aligned"
            mv "${apk}.aligned" "$apk"
            # Sign with apksigner
            "$ANDROID_HOME/build-tools/35.0.0/apksigner" sign \
              --ks /tmp/flaccrunch-release.keystore \
              --ks-pass pass:flaccrunch \
              --ks-key-alias release \
              --key-pass pass:flaccrunch \
              "$apk"
          done

      - name: Collect APK files
        run: |
          mkdir -p release-apks
          REF_SLUG=$(echo "${{ github.ref_name }}" | sed 's|/|-|g')
          find . -name "*.apk" -not -path "./.git/*" -type f | while read apk; do
            BASENAME=$(basename "$apk")
            # Map Gradle arch names to clean names, strip -release-unsigned suffix
            CLEAN=$(echo "$BASENAME" \
              | sed 's/app-arm64-v8a-release-unsigned/arm64/' \
              | sed 's/app-armeabi-v7a-release-unsigned/armv7/' \
              | sed 's/app-x86_64-release-unsigned/x86_64/' \
              | sed 's/app-x86-release-unsigned/x86/' \
              | sed 's/-release-unsigned//')
            cp "$apk" "release-apks/FlacCrunch-${REF_SLUG}-${CLEAN}"
          done
          echo "Collected APKs:"
          ls -la release-apks/ 2>/dev/null || echo "No APKs found"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flaccrunch-android
          path: release-apks/*.apk
          if-no-files-found: warn

      - name: Upload APK to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release-apks/*.apk
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
