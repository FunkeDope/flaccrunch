# Build optimizations for maximum CPU performance on native hardware.
# These flags affect both the Rust compiler and the C compiler used to build
# libflac-sys (via the `cc` crate), enabling SIMD/AVX2 vectorization that
# matches what a pre-built flac.exe typically has.

[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-cpu=native"]

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "target-cpu=native"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "target-cpu=native"]

[target.x86_64-apple-darwin]
rustflags = ["-C", "target-cpu=native"]

# CFLAGS is picked up by the `cc` crate (used by libflac-sys's build script)
# to compile the libFLAC C sources with SIMD optimizations.
# MSVC: /O2 = full optimization, /arch:AVX2 = enable AVX2 SIMD instructions
# These are set only on Windows; on other platforms cc uses -O3 -march=native
# via the rust opt-level=3 passthrough.
[env]
CFLAGS_x86_64-pc-windows-msvc = "/O2 /arch:AVX2"
