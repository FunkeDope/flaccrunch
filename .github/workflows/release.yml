name: Build & Release

on:
  push:
    tags:
      - 'v*'
      - 'V*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: macos-arm
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: macos-intel

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            flac

      - name: Install FLAC (macOS)
        if: runner.os == 'macOS'
        run: brew install flac

      - name: Install FLAC (Windows)
        if: runner.os == 'Windows'
        run: choco install flac -y

      - name: Place sidecar binaries
        shell: bash
        run: |
          EXT=""
          if [ "${{ runner.os }}" = "Windows" ]; then EXT=".exe"; fi

          FLAC_PATH=$(which flac 2>/dev/null || true)
          METAFLAC_PATH=$(which metaflac 2>/dev/null || true)

          if [ -n "$FLAC_PATH" ]; then
            cp "$FLAC_PATH" "src-tauri/binaries/flac-${{ matrix.target }}${EXT}"
          else
            echo "::error::flac binary not found in PATH"
            exit 1
          fi

          if [ -n "$METAFLAC_PATH" ]; then
            cp "$METAFLAC_PATH" "src-tauri/binaries/metaflac-${{ matrix.target }}${EXT}"
          else
            echo "::error::metaflac binary not found in PATH"
            exit 1
          fi

          chmod +x src-tauri/binaries/* 2>/dev/null || true
          echo "Sidecar binaries:"
          ls -la src-tauri/binaries/

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'FlacCrunch ${{ github.ref_name }}'
          releaseBody: |
            Cross-platform lossless FLAC recompression with album art optimization.

            ## Downloads
            - **Windows**: `.msi` installer or `.exe` setup
            - **macOS**: `.dmg` disk image
            - **Linux**: `.deb` package or `.AppImage`
            - **Android**: `.apk` (experimental — requires Termux with flac installed)

            ## Features
            - Lossless FLAC recompression at maximum compression (level 8, exhaustive)
            - Decoded-audio MD5 verification for data integrity
            - PNG optimization (oxipng) and JPEG optimization (jpegtran)
            - Multi-threaded processing with configurable worker count
            - Real-time progress dashboard
            - Detailed logging with EFC-format summary
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flaccrunch-${{ matrix.artifact }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: ignore

  build-android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;27.0.12077973"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            cmake

      - name: Cross-compile FLAC for Android
        run: |
          git clone --depth 1 --branch 1.4.3 https://github.com/xiph/flac.git /tmp/flac-src

          for ARCH_ABI in arm64-v8a armeabi-v7a x86_64 x86; do
            case $ARCH_ABI in
              arm64-v8a)    TARGET=aarch64-linux-android ;;
              armeabi-v7a)  TARGET=armv7-linux-androideabi ;;
              x86_64)       TARGET=x86_64-linux-android ;;
              x86)          TARGET=i686-linux-android ;;
            esac

            echo "Building FLAC for $ARCH_ABI ($TARGET)..."
            cd /tmp/flac-src
            mkdir -p build-$ARCH_ABI && cd build-$ARCH_ABI
            cmake .. \
              -DCMAKE_TOOLCHAIN_FILE=$NDK_HOME/build/cmake/android.toolchain.cmake \
              -DANDROID_ABI=$ARCH_ABI \
              -DANDROID_NATIVE_API_LEVEL=24 \
              -DBUILD_SHARED_LIBS=OFF \
              -DBUILD_PROGRAMS=ON \
              -DBUILD_EXAMPLES=OFF \
              -DBUILD_TESTING=OFF \
              -DBUILD_DOCS=OFF \
              -DINSTALL_MANPAGES=OFF \
              -DWITH_OGG=OFF
            cmake --build . -j$(nproc)

            cp src/flac/flac $GITHUB_WORKSPACE/src-tauri/binaries/flac-$TARGET
            cp src/metaflac/metaflac $GITHUB_WORKSPACE/src-tauri/binaries/metaflac-$TARGET
            chmod +x $GITHUB_WORKSPACE/src-tauri/binaries/flac-$TARGET
            chmod +x $GITHUB_WORKSPACE/src-tauri/binaries/metaflac-$TARGET
            echo "Done: $ARCH_ABI"
          done

          echo "Android sidecar binaries:"
          ls -la $GITHUB_WORKSPACE/src-tauri/binaries/

      - name: Install npm dependencies
        run: npm ci

      - name: Initialize Tauri Android project
        run: |
          npx tauri android init
          echo "Android project initialized"
          ls -la src-tauri/gen/android/ || true

      - name: Build Android APK
        run: |
          npx tauri android build --apk 2>&1 || {
            echo "::warning::Android APK build failed. Tauri v2 Android support is experimental."
            echo "Attempting debug build as fallback..."
            npx tauri android build --apk --debug 2>&1 || {
              echo "::warning::Android debug APK build also failed."
              exit 0
            }
          }
        env:
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Collect APK files
        id: collect-apk
        run: |
          mkdir -p release-apks
          FOUND=0

          # Search for APKs in multiple possible locations
          for dir in \
            "src-tauri/gen/android/app/build/outputs/apk" \
            "src-tauri/gen/android/app/build/outputs/flutter-apk" \
            "src-tauri/gen/android"; do
            if [ -d "$dir" ]; then
              find "$dir" -name "*.apk" -type f | while read apk; do
                BASENAME=$(basename "$apk")
                cp "$apk" "release-apks/FlacCrunch-${{ github.ref_name }}-${BASENAME}"
                echo "Found APK: $apk"
                FOUND=1
              done
            fi
          done

          # Also do a broad search
          find . -name "*.apk" -not -path "./.git/*" -type f 2>/dev/null | while read apk; do
            BASENAME=$(basename "$apk")
            cp "$apk" "release-apks/FlacCrunch-${{ github.ref_name }}-${BASENAME}" 2>/dev/null || true
          done

          echo "Collected APKs:"
          ls -la release-apks/ 2>/dev/null || echo "No APKs found"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flaccrunch-android
          path: release-apks/*.apk
          if-no-files-found: warn

      - name: Upload APK to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release-apks/*.apk
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
